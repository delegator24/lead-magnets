<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Delegator24</title>
  <style>
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
           font-family:-apple-system,Segoe UI,Roboto,sans-serif; background:#f7faff; color:#101820; }
    .box { text-align:center; }
    .dot { width:10px; height:10px; border-radius:50%; background:#a4d65e; display:inline-block;
           margin-right:8px; animation:p 1.6s ease-in-out infinite; }
    @keyframes p { 0%,100%{opacity:1} 50%{opacity:.3} }
    p { color:#8a8d8f; font-size:14px; }
  </style>
</head>
<body>
  <div class="box">
    <h1 style="font-size:22px;margin:0 0 8px">Delegator24</h1>
    <p><span class="dot"></span>Страница готовится</p>
  </div>
</body>
</html>
